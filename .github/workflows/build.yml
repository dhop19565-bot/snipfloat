name: Build SnipFloat EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pillow pystray pywin32 pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SnipFloat snip_tool.py --clean --noconfirm

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnipFloat-Windows
          path: dist/SnipFloat.exe
